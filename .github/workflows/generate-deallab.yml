name: Render Deal Lab Sample Images

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  render-samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare sample JSON
        run: |
          mkdir -p clients/therealestatedeallab/samples
          cp posted/deallab-2026-06-27.json clients/therealestatedeallab/samples/deallab-2026-06-27.json
          cp posted/deallab-2026-06-28.json clients/therealestatedeallab/samples/deallab-2026-06-28.json

      - name: Render sample images
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_IMAGE_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_IMAGE_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY }}
          OPENAI_IMAGE_2K: ${{ vars.OPENAI_IMAGE_2K }}
          OPENAI_IMAGE_LONG_EDGE: ${{ vars.OPENAI_IMAGE_LONG_EDGE }}
        run: |
          pip install openai requests pillow
          python scripts/openai_gen.py clients/therealestatedeallab/samples/deallab-2026-06-27.json
          python scripts/openai_gen.py clients/therealestatedeallab/samples/deallab-2026-06-28.json

      - name: Open sample image PR
        env:
          GH_TOKEN: ${{ secrets.ENGINE_PR_TOKEN }}
        run: |
          BRANCH="deallab/sample-images-${GITHUB_RUN_ID}"
          git config user.name "layer8-engine"
          git config user.email "engine@layer8culture.io"
          git checkout -b "$BRANCH"
          git add clients/therealestatedeallab/samples
          git add -f assets/generated/20260627-deallab-* assets/generated/20260628-deallab-*
          git commit -m "Render Deal Lab sample images"
          git push origin "$BRANCH"
          SHA=$(git rev-parse HEAD)
          python scripts/build_pr_preview.py clients/therealestatedeallab/samples/deallab-2026-06-27.json --repo "${{ github.repository }}" --sha "$SHA" --brand "TheRealEstateDealLab Samples Day 1" --out pr-day1.md
          python scripts/build_pr_preview.py clients/therealestatedeallab/samples/deallab-2026-06-28.json --repo "${{ github.repository }}" --sha "$SHA" --brand "TheRealEstateDealLab Samples Day 2" --out pr-day2.md
          cat pr-day1.md > pr-body.md
          printf '\n\n---\n\n' >> pr-body.md
          cat pr-day2.md >> pr-body.md
          gh pr create --title "Render Deal Lab sample images" --body-file pr-body.md --base main --head "$BRANCH"
