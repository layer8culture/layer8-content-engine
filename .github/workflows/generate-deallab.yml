name: Generate Deal Lab Content

on:
  schedule:
    # Daily morning run for America/New_York. Generates same-day Instagram content
    # for The Real Estate Deal Lab only.
    - cron: "30 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-deallab:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
    steps:
      - uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate Deal Lab posts with Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          copilot -p "$(cat clients/therealestatedeallab/generation-prompt.md)" \
            -s \
            --allow-tool='read,write(queue/*)' \
            --no-ask-user

      - name: Verify queue file was written
        run: |
          QUEUE_FILE="queue/deallab-$(date +%F).json"
          if [ ! -f "$QUEUE_FILE" ]; then
            echo "::error::Copilot CLI did not write $QUEUE_FILE."
            echo "queue/ currently contains:"
            ls -la queue/ || true
            exit 1
          fi
          echo "Confirmed $QUEUE_FILE was written ($(wc -c < "$QUEUE_FILE") bytes)."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate visuals via OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_IMAGE_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_IMAGE_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY }}
          OPENAI_IMAGE_2K: ${{ vars.OPENAI_IMAGE_2K }}
          OPENAI_IMAGE_LONG_EDGE: ${{ vars.OPENAI_IMAGE_LONG_EDGE }}
        run: |
          pip install openai requests pillow
          QUEUE_FILE="queue/deallab-$(date +%F).json"
          echo "Generating images for $QUEUE_FILE"
          python scripts/openai_gen.py "$QUEUE_FILE"

      - name: Open approval PR
        env:
          GH_TOKEN: ${{ secrets.ENGINE_PR_TOKEN }}
        run: |
          DATE=$(date +%F)
          BRANCH="deallab/posts-$DATE-${GITHUB_RUN_ID}"
          git config user.name "layer8-engine"
          git config user.email "engine@layer8culture.io"
          git checkout -b "$BRANCH"
          git add queue/
          git add -f assets/generated
          git commit -m "Deal Lab posts for $DATE - ready for review"
          git push origin "$BRANCH"
          SHA=$(git rev-parse HEAD)
          QUEUE_FILE="queue/deallab-$DATE.json"
          python scripts/build_pr_preview.py "$QUEUE_FILE" \
                 --repo "${{ github.repository }}" \
                 --sha "$SHA" \
                 --brand "TheRealEstateDealLab" \
                 --out pr-body.md
          gh pr create --title "Deal Lab posts for $DATE" \
                       --body-file pr-body.md \
                       --base main --head "$BRANCH"
