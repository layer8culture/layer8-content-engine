name: AIGraph SEO and AEO Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AIGraph audit
        run: |
          python scripts/aigraph_audit.py --output-dir analytics/aigraph || true

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: aigraph-audit
          path: analytics/aigraph/

      - name: Open recommendation PR when token is available
        env:
          ENGINE_PR_TOKEN: ${{ secrets.ENGINE_PR_TOKEN }}
          GH_TOKEN: ${{ secrets.ENGINE_PR_TOKEN }}
        run: |
          if [ -z "$ENGINE_PR_TOKEN" ]; then
            echo "ENGINE_PR_TOKEN is not set. Audit artifact uploaded only."
            exit 0
          fi
          if git diff --quiet -- analytics/aigraph; then
            echo "No AIGraph analytics changes to propose."
            exit 0
          fi
          branch="aigraph/audit-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add analytics/aigraph
          git commit -m "chore(aigraph): update SEO and AEO audit report"
          git push origin "$branch"
          gh pr create \
            --title "chore(aigraph): update SEO and AEO audit report" \
            --body "Automated AIGraph audit report. Review before merging." \
            --base main \
            --head "$branch"
