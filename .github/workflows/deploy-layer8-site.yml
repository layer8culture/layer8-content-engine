name: Deploy Layer8Culture Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deployment token
        id: token
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LAYER8CULTURE }}
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "AZURE_STATIC_WEB_APPS_API_TOKEN_LAYER8CULTURE is not set. Skipping deploy."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy static guides
        if: steps.token.outputs.enabled == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LAYER8CULTURE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: site
          output_location: ""
          skip_app_build: true
