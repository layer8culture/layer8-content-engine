name: Daily Report (morning)

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC ≈ 7-8am ET — adjust to taste
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Build report with Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          copilot -p "Read posted/log.json, any files in queue/, and
          analytics/insights-digest.md if it exists. Write a short daily report to
          report.md for Donville with: (1) follower progress toward the 4,000 goal
          and the 7-day change (from the insights digest), (2) the top 2 and bottom 2
          performing posts by reach/saves and one takeaway on which format is winning,
          (3) what was scheduled or published in the last 24h per account, (4) anything
          that failed or was skipped (look for scheduled:false), (5) what's awaiting
          approval, (6) one concrete suggestion for tomorrow's format mix + topic based
          on the data. Friendly, tight, under 220 words. Plain text, no headers." \
            -s \
            --allow-tool='read,write(report.md)' \
            --no-ask-user

      - name: Send report
        env:
          WEBHOOK: ${{ secrets.REPORT_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            python3 - <<'EOF'
          import json, os, urllib.request
          body = open("report.md").read()
          req = urllib.request.Request(
              os.environ["WEBHOOK"],
              data=json.dumps({"content": body[:1900]}).encode(),
              headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req)
          EOF
          else
            echo "No REPORT_WEBHOOK set — printing report:"
            cat report.md
          fi
