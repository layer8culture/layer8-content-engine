name: Generate Lofi Content (Layer8CultureRadio)

on:
  schedule:
    # 02:00 UTC on Mon / Wed / Fri — targets a Mon/Wed/Fri queue file (today's UTC
    # date), kept distinct from the layer8culture nightly run.
    - cron: "0 2 * * 1,3,5"
  workflow_dispatch: {}     # manual trigger button

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-lofi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh "Now Live" video promos from YouTube
        # Pull the latest Layer8CultureRadio uploads via the public YouTube RSS feed
        # (no API key) and rewrite the Now Live section of calendar/topics-lofi.md so
        # the generator below turns new sessions into "Now Live on YouTube" promo
        # posts. Non-fatal: if the feed is unreachable the run falls back to evergreen.
        run: |
          pip install requests
          python scripts/fetch_youtube.py --max 1

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate lofi posts with Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        # Lofi is evergreen brand content; no web research needed. Writes stay
        # scoped to queue/* (the agent only reads brand + steering files).
        run: |
          copilot -p "$(cat scripts/generation-prompt-lofi.md)" \
            -s \
            --allow-tool='read,write(queue/*)' \
            --no-ask-user

      - name: Verify the queue file was written
        # The Copilot step above MUST write queue/lofi-<today>.json. If the agent
        # instead prints the JSON to the log (a known intermittent miss where it
        # wrongly believes writes are blocked), nothing lands on disk. Fail loudly
        # here with an actionable message instead of letting the downstream visuals
        # step crash cryptically (python openai_gen.py "" -> IsADirectoryError: '.').
        run: |
          QUEUE_FILE="queue/lofi-$(date +%F).json"
          if [ ! -f "$QUEUE_FILE" ]; then
            echo "::error::Copilot CLI did not write $QUEUE_FILE. The generation step produced no queue file (it likely printed the JSON to the run log instead of writing it). Re-run the workflow to regenerate."
            echo "queue/ currently contains:"
            ls -la queue/ || true
            exit 1
          fi
          echo "Confirmed $QUEUE_FILE was written ($(wc -c < "$QUEUE_FILE") bytes)."

      - name: Install ffmpeg (for Reels)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate visuals via OpenAI + Reels via ffmpeg
        env:
          # Image backend: Azure OpenAI is used when the AZURE_OPENAI_* secrets
          # are set (deployment-based); otherwise it falls back to direct OpenAI.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_IMAGE_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_IMAGE_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          # Premium image defaults: quality "high" + 2K master (empty/unset = high/on).
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY }}
          OPENAI_IMAGE_2K: ${{ vars.OPENAI_IMAGE_2K }}
          OPENAI_IMAGE_LONG_EDGE: ${{ vars.OPENAI_IMAGE_LONG_EDGE }}
          # Reel backend: Sora-2 (Azure) renders format:"reel" posts; it reuses the
          # AZURE_OPENAI_ENDPOINT/KEY above and falls back to ffmpeg motion if unset.
          AZURE_OPENAI_VIDEO_DEPLOYMENT: ${{ vars.AZURE_OPENAI_VIDEO_DEPLOYMENT }}
          AZURE_OPENAI_VIDEO_API_VERSION: ${{ vars.AZURE_OPENAI_VIDEO_API_VERSION }}
          AZURE_OPENAI_VIDEO_SIZE: ${{ vars.AZURE_OPENAI_VIDEO_SIZE }}
        run: |
          pip install openai requests pillow
          # Process this run's lofi queue (the file the Copilot step just generated).
          # Fall back to the newest lofi queue file if the dated one is missing.
          QUEUE_FILE="queue/lofi-$(date +%F).json"
          [ -f "$QUEUE_FILE" ] || QUEUE_FILE=$(ls -t queue/lofi-*.json | head -n 1)
          echo "Generating images for $QUEUE_FILE"
          python scripts/openai_gen.py "$QUEUE_FILE"
          # Animate any format:"reel" posts into mp4s (uses the stills above).
          echo "Rendering reels for $QUEUE_FILE"
          python scripts/reel_gen.py "$QUEUE_FILE"

      - name: Open approval PR
        # As with the main pipeline, the org disables Actions-created PRs, so we
        # open it with a user PAT (ENGINE_PR_TOKEN). The branch push uses the
        # checkout-persisted GITHUB_TOKEN; only `gh pr create` reads GH_TOKEN.
        env:
          GH_TOKEN: ${{ secrets.ENGINE_PR_TOKEN }}
        run: |
          DATE=$(date +%F)
          BRANCH="lofi/posts-$DATE"
          git config user.name "layer8-engine"
          git config user.email "engine@layer8culture.io"
          git checkout -b "$BRANCH"
          # -f on assets/generated so the freshly rendered media are included in
          # the approval PR for review (the dir is .gitignored for local hygiene).
          git add queue/
          git add calendar/topics-lofi.md
          git add -f assets/generated
          git commit -m "Lofi posts for $DATE — ready for review"
          git push origin "$BRANCH"
          # Build a visual PR body (image(s) + exact caption + hashtags) so the
          # reviewer sees what will post, Postiz-style, right where they approve.
          SHA=$(git rev-parse HEAD)
          QUEUE_FILE="queue/lofi-$DATE.json"
          [ -f "$QUEUE_FILE" ] || QUEUE_FILE=$(ls -t queue/lofi-*.json | head -n 1)
          python scripts/build_pr_preview.py "$QUEUE_FILE" \
                 --repo "${{ github.repository }}" \
                 --sha "$SHA" \
                 --brand "Layer8CultureRadio" \
                 --out pr-body.md
          gh pr create --title "Lofi posts for $DATE" \
                       --body-file pr-body.md \
                       --base main --head "$BRANCH"
