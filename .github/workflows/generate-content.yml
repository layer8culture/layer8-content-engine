name: Generate Content (nightly)

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC = 22:00 America/New_York the prior evening; the job resolves "tomorrow" in TZ (America/New_York) so it targets the approval-morning date
  workflow_dispatch: {}     # manual trigger button

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Resolve all dates in the brand's local timezone so "tomorrow" (in the Copilot
    # generation step and the `date -d tomorrow` shell steps below) matches the
    # America/New_York day a human approves the batch. Without TZ the runner is UTC,
    # where 02:00 UTC is already the next calendar day — so dates landed a day too
    # far ahead and posts scheduled for tomorrow instead of today.
    env:
      TZ: America/New_York
    steps:
      - uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate posts with Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        # web-fetch + --allow-all-urls let the agent research the day's AI news.
        # Writes stay scoped to queue/* (the agent only reads the web). For a
        # stricter setup, replace --allow-all-urls with one or more
        # --allow-url=<domain> flags for a curated source allow-list.
        run: |
          copilot -p "$(cat scripts/generation-prompt.md)" \
            -s \
            --allow-tool='read,write(queue/*),web-fetch' \
            --allow-all-urls \
            --no-ask-user

      - name: Verify the queue file was written
        # The Copilot step above MUST write queue/<tomorrow>.json. If the agent
        # instead prints the JSON to the log (a known intermittent miss where it
        # wrongly believes writes are blocked), nothing lands on disk. Fail loudly
        # here with an actionable message instead of letting the downstream visuals
        # step crash cryptically (python openai_gen.py "" -> IsADirectoryError: '.').
        run: |
          QUEUE_FILE="queue/$(date -d tomorrow +%F).json"
          if [ ! -f "$QUEUE_FILE" ]; then
            echo "::error::Copilot CLI did not write $QUEUE_FILE. The generation step produced no queue file (it likely printed the JSON to the run log instead of writing it). Re-run the workflow to regenerate."
            echo "queue/ currently contains:"
            ls -la queue/ || true
            exit 1
          fi
          echo "Confirmed $QUEUE_FILE was written ($(wc -c < "$QUEUE_FILE") bytes)."

      - name: Verify summary has no internal process warnings
        run: |
          SUMMARY_FILE="queue/$(date -d tomorrow +%F).summary.md"
          if [ -f "$SUMMARY_FILE" ]; then
            if grep -Eiq 'permission issue|write access|session artifact|\\.copilot/session-state|copy that file|manual.*queue|tool name|allow-tool' "$SUMMARY_FILE"; then
              echo "::error::$SUMMARY_FILE contains internal process or permission-warning text. Re-run generation after fixing the summary."
              sed -n '1,80p' "$SUMMARY_FILE"
              exit 1
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg (for Reels)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate visuals via OpenAI + Reels via ffmpeg
        env:
          # Image backend: Azure OpenAI is used when the AZURE_OPENAI_* secrets
          # are set (deployment-based); otherwise it falls back to direct OpenAI.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_IMAGE_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_IMAGE_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          # Premium image defaults: quality "high" + 2K master (empty/unset = high/on).
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY }}
          OPENAI_IMAGE_2K: ${{ vars.OPENAI_IMAGE_2K }}
          OPENAI_IMAGE_LONG_EDGE: ${{ vars.OPENAI_IMAGE_LONG_EDGE }}
          # Reel backend: Sora-2 (Azure) renders format:"reel" posts; it reuses the
          # AZURE_OPENAI_ENDPOINT/KEY above and falls back to ffmpeg motion if unset.
          AZURE_OPENAI_VIDEO_DEPLOYMENT: ${{ vars.AZURE_OPENAI_VIDEO_DEPLOYMENT }}
          AZURE_OPENAI_VIDEO_API_VERSION: ${{ vars.AZURE_OPENAI_VIDEO_API_VERSION }}
          AZURE_OPENAI_VIDEO_SIZE: ${{ vars.AZURE_OPENAI_VIDEO_SIZE }}
        run: |
          pip install openai requests pillow
          # Process tomorrow's queue (the file the Copilot step just generated).
          # Fall back to the newest queue file if the dated one is missing.
          QUEUE_FILE="queue/$(date -d tomorrow +%F).json"
          [ -f "$QUEUE_FILE" ] || QUEUE_FILE=$(ls -t queue/*.json | head -n 1)
          echo "Generating images for $QUEUE_FILE"
          python scripts/openai_gen.py "$QUEUE_FILE"
          # Animate any format:"reel" posts into mp4s (uses the stills above).
          echo "Rendering reels for $QUEUE_FILE"
          python scripts/reel_gen.py "$QUEUE_FILE"

      - name: Open approval PR
        # The org disables "Allow GitHub Actions to create pull requests", so the
        # built-in GITHUB_TOKEN cannot open the approval PR. We create it with a
        # user PAT (ENGINE_PR_TOKEN, repo scope) instead — a PR authored by a real
        # user is not subject to that restriction. The branch push still uses the
        # checkout-persisted GITHUB_TOKEN; only `gh pr create` reads GH_TOKEN.
        env:
          GH_TOKEN: ${{ secrets.ENGINE_PR_TOKEN }}
        run: |
          DATE=$(date -d tomorrow +%F)
          BRANCH="posts/$DATE"
          git config user.name "layer8-engine"
          git config user.email "engine@layer8culture.io"
          git checkout -b "$BRANCH"
          # -f on assets/generated so the freshly rendered media are included in
          # the approval PR for review (the dir is .gitignored for local hygiene).
          # Captures images, carousel slides, reel mp4s and their cover frames.
          git add queue/
          git add -f assets/generated
          git commit -m "Posts for $DATE — ready for review"
          git push origin "$BRANCH"
          # Build a visual PR body (image(s) + exact caption + hashtags) so the
          # reviewer sees what will post, Postiz-style, right where they approve.
          # Images embed by the just-pushed commit SHA via raw.githubusercontent.com
          # (immutable, survives branch deletion on merge; relies on a public repo).
          SHA=$(git rev-parse HEAD)
          QUEUE_FILE="queue/$DATE.json"
          [ -f "$QUEUE_FILE" ] || QUEUE_FILE=$(ls -t queue/*.json | head -n 1)
          python scripts/build_pr_preview.py "$QUEUE_FILE" \
                 --repo "${{ github.repository }}" \
                 --sha "$SHA" \
                 --out pr-body.md
          gh pr create --title "Posts for $DATE" \
                       --body-file pr-body.md \
                       --base main --head "$BRANCH"
